{% extends "base.html" %}
{% block title_suffix %} — Login{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="glass-card auth-card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to your Campusino account</p>
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" class="form-input" id="email" name="email" placeholder="you@campus.edu" required>
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" class="form-input" id="password" name="password" placeholder="••••••••" required>
            </div>
            <div class="form-group form-check">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember" style="margin:0; font-weight:400;">Remember me</label>
            </div>
            <button type="submit" class="btn-primary-c btn-block">Sign In</button>
        </form>
        <p class="footer-text">Don't have an account? <a href="{{ url_for('register') }}">Create one</a></p>
    </div>
</div>
{% endblock %}
