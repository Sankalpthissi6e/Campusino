{% extends "base.html" %}
{% block title_suffix %} — Add Product{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="glass-card auth-card" style="max-width:600px;">
        <h2><i class="fas fa-plus-circle" style="color:var(--accent-light);"></i> List a Product</h2>
        <p class="subtitle">Reach thousands of students on campus</p>
        <form method="POST" action="{{ url_for('add_product') }}">
            <div class="form-group">
                <label for="title">Product Title</label>
                <input type="text" class="form-input" id="title" name="title" placeholder="e.g. Data Structures Textbook" required>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                <div class="form-group">
                    <label for="category_id">Category</label>
                    <select class="form-input" id="category_id" name="category_id" required>
                        <option value="" disabled selected>Select...</option>
                        {% for category in categories %}
                        <option value="{{ category.CategoryID }}">{{ category.CategoryName }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="type">Type</label>
                    <select class="form-input" id="type" name="type" required>
                        <option value="SELL">Sell</option>
                        <option value="RENT">Rent</option>
                    </select>
                </div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                <div class="form-group">
                    <label for="price">Price (₹)</label>
                    <input type="number" step="0.01" min="0.01" class="form-input" id="price" name="price" placeholder="350.00" required>
                </div>
                <div class="form-group">
                    <label for="condition">Condition</label>
                    <input type="text" class="form-input" id="condition" name="condition" placeholder="New, Like New, Good" required>
                </div>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea class="form-input" id="description" name="description" rows="4" placeholder="Describe your product in detail..." required></textarea>
            </div>
            <button type="submit" class="btn-success-c btn-block"><i class="fas fa-check"></i> Publish Listing</button>
        </form>
    </div>
</div>
{% endblock %}
