{% extends "base.html" %}
{% block title_suffix %} — Report{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="glass-card auth-card" style="max-width:550px;">
        <h2><i class="fas fa-flag" style="color:var(--warning);"></i> Report a Problem</h2>
        <p class="subtitle">Help us keep Campusino safe for everyone</p>
        <form method="POST" action="{{ url_for('report') }}">
            <div class="form-group">
                <label for="product_id"><i class="fas fa-box"></i> Product</label>
                <select class="form-input" id="product_id" name="product_id" required>
                    <option value="" disabled selected>Select a product...</option>
                    {% for product in products %}
                    <option value="{{ product.ProductID }}">{{ product.Title }} — {{ product.seller.Name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="reason"><i class="fas fa-exclamation-triangle"></i> Reason</label>
                <textarea class="form-input" id="reason" name="reason" rows="4" placeholder="Describe the issue in detail..." required></textarea>
            </div>
            <button type="submit" class="btn-warning-c btn-block"><i class="fas fa-paper-plane"></i> Submit Report</button>
        </form>
    </div>
</div>
{% endblock %}
